name: ckikatowice
description: "CKI Katowice mosque app — prayer times, Qibla, Quran, news and Khutba."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.6.2
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_compass: ^0.8.1
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  just_audio: ^0.9.42
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  http: ^1.2.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
flutter_icons:
  android: true
  ios: true
  image_path: "icons/logo.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/audio/adhan.mp3
